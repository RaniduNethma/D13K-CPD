spring.application.name=hotel-management-service-api

server.port=8090

#Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/cpd?createDatabaseIfNotExist=true
spring.datasource.username=cpd_user
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.generate-ddl=true
spring.jpa.hibernate.ddl-auto=update

eureks.client.serviceUrl.defaultZone=http://localhost:8761/eureka